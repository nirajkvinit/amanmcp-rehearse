# Validation Queries
# ===================
# Single source of truth for legacy validation and the F37 graded search corpus.
#
# Compatibility:
#   - tier1, tier2, and negative keep the existing validation behavior.
#   - expected remains a legacy shorthand and maps to grade-3 expected_results.
#   - graded entries are for the F37 eval runner and are not executed by the
#     legacy Tier 1/Tier 2/negative integration tests.
#
# F37 fields:
#   id, name, query, tool, class, job, expected_results, holdout, source, notes
#
# Allowed classes:
#   exact_identifier, path_lookup, config_error, natural_language_intent,
#   caller_callee, impact_analysis, docs_to_code, test_to_implementation,
#   adr_to_code, cross_file_subsystem, negative_adversarial
#
# Allowed jobs:
#   code, project_memory, decision_lookup, pm_inspection, exact_lookup, general

