schema_version: 1
# Direct graph.query eval corpus (FEAT-GRA2).
#
# Every expected row is labeled against ACTUAL `graph.query` output observed on a
# normal index of this repository (TASK-GRA12/13/14). Matchers use current result
# fields only (source_path, node_kind, relation, role, confidence_label,
# evidence_method, graph_path_contains) and never node_id, which is index-volatile.
#
# Classes (expectation_class):
#   quality              (default) - scored against per-mode relevance thresholds.
#   degraded             - intentionally targets a zero-result/degraded state.
#   gap                  - documents a future-semantics relationship not represented
#                          by current traversal (see FEAT-GRA3 / FEAT-GRA4).
#   negative_adversarial - passes only when prohibited bad behavior is absent and the
#                          expected graceful outcome is present (TASK-GRA26). Gated at
#                          100% via negative_adversarial_pass_rate in make eval-graph-quick.
#
# GRA19 disambiguation re-baseline (gap policy):
#   Nine cases were re-labeled `gap` when graph.query began resolving a subject
#   before traversing (TASK-GRA19): GRA13-ES-Q02 (QueryResult), -Q07
#   (relatedResults), -Q08 (roleFor), -Q11 (fuseResults), -Q12 (Snapshot), -Q13
#   (BM25), -Q14 (Repository), and GRA14-IA-Q15/-Q16 (internal/chunk,
#   internal/config). Each subject now returns `disambiguation_required` or
#   `subject_not_found` instead of a merged result, so its pre-GRA19 positive
#   `expected` rows can never match.
#
#   DEBT-041 update: -Q07 (relatedResults) and -Q08 (roleFor) had a SINGLE source
#   declaration; their `disambiguation_required` was a data-quality artifact — the
#   graph extractor emitted two drift-duplicate symbol nodes for one declaration.
#   DEBT-041 collapses those drift duplicates at extraction, so both subjects now
#   resolve cleanly and have been RESTORED to `quality`.
#
#   GRA20 update: explicit package-directory resolution is covered by
#   GRA20-FR-Q02 (`subject_type: package`). -Q15/-Q16 remain gap cases because
#   their mode is `impact_analysis`: package subjects resolve, but today's
#   single-hop impact traversal only follows outgoing edges, while
#   `file_declares_package` points file -> package.
#   The five genuinely ambiguous subjects below remain `gap` pending GRA26's
#   disambiguation matcher.
#
#   The eval result shape (DirectGraphQueryResult)
#   does not yet carry `resolution`/`candidates`, so these cases CANNOT be scored
#   on the new contract and are excluded from quality (they retain one positive
#   row only because the loader requires >=1 `expected` entry). The disambiguation
#   contract IS asserted at the Go unit-test level (internal/graph: resolve_test.go,
#   query_test.go TestQueryService_DisambiguatesAmbiguousSymbol /
#   _SubjectNotFoundEmitsResolutionAndHints). TASK-GRA26 MUST add a `resolution`/
#   `candidates` matcher to the eval harness and convert these gap cases into
#   explicit disambiguation_required/subject_not_found assertions (then remove the
#   placeholder `expected` rows). Until then, do not read these rows as live
#   positive expectations.
