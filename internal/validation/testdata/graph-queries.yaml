schema_version: 1
# Direct graph.query eval corpus (FEAT-GRA2).
#
# Every expected row is labeled against ACTUAL `graph.query` output observed on a
# normal index of this repository (TASK-GRA12/13/14). Matchers use current result
# fields only (source_path, node_kind, relation, role, confidence_label,
# evidence_method, graph_path_contains) and never node_id, which is index-volatile.
#
# Classes (expectation_class):
#   quality  (default) - scored against per-mode relevance thresholds.
#   degraded           - intentionally targets a zero-result/degraded state.
#   gap                - documents a future-semantics relationship not represented
#                        by current traversal (see FEAT-GRA3 / FEAT-GRA4).
queries:
  # ===========================================================================
  # TASK-GRA10 smoke rows (kept; one per mode)
  # ===========================================================================
  - id: GRA10-FR-Q01
    name: Find references for graph query service file
    mode: find_references
    query: internal/graph/query.go
    limit: 10
    include_stale: false
    subsets: [quick, full, mode:find_references]
    holdout: false
    source: task-gra10-smoke
    expected:
      - source_path: internal/graph/query.go
        node_kind: chunk
        role: related
        relation: symbol_has_chunk
        confidence_label: exact
        evidence_method: chunk_symbol_membership
        graph_path_contains: [symbol_has_chunk]
        rationale: Direct graph eval should preserve source-cited evidence for the graph query implementation file.
    metadata:
      owner_task: TASK-GRA10
      language: go

  - id: GRA10-ES-Q01
    name: Explain graph query service symbol
    mode: explain_symbol
    query: QueryService
    limit: 10
    include_stale: false
    subsets: [quick, full, mode:explain_symbol]
    holdout: false
    source: task-gra10-smoke
    expected:
      - source_path: internal/graph/query.go
        node_kind: chunk
        role: symbol_context
        relation: symbol_has_chunk
        confidence_label: exact
        evidence_method: chunk_symbol_membership
        graph_path_contains: [symbol_has_chunk]
        rationale: explain_symbol should return symbol-context evidence for matching graph query service symbols.
    metadata:
      owner_task: TASK-GRA10
      language: go

  - id: GRA10-IA-Q01
    name: Impact analysis for graph query service symbol
    mode: impact_analysis
    query: QueryService
    limit: 10
    include_stale: false
    subsets: [quick, full, mode:impact_analysis]
    holdout: false
    source: task-gra10-smoke
    expected:
      - source_path: internal/graph/query.go
        node_kind: chunk
        role: downstream
        relation: symbol_has_chunk
        confidence_label: exact
        evidence_method: chunk_symbol_membership
        graph_path_contains: [symbol_has_chunk]
        rationale: impact_analysis should return downstream graph evidence for matching graph query service symbols.
    metadata:
      owner_task: TASK-GRA10
      language: go

